```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre Workout Store</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        h2 {
            text-align: center;
            padding: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
        }

        .price {
            color: #00e676;
            font-weight: bold;
        }

        button {
            margin: 4px;
            background: #ff6600;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 5px;
            cursor: pointer;
            width: 90%;
        }

        .cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: orange;
            padding: 14px;
            border-radius: 50%;
            font-size: 18px;
        }

        .cart-box {
            position: fixed;
            bottom: 80px;
            right: 15px;
            width: 260px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .review-section {
            width: 90%;
            max-width: 350px;
            margin: 20px auto;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }

        .review-section input,
        .review-section textarea,
        .review-section select {
            width: 95%;
            padding: 6px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        .review-section textarea {
            height: 60px;
        }

        .review-item {
            background: #333;
            padding: 6px;
            margin: 5px 0;
            border-radius: 5px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <h2>Whey</h2>

    <div id="grid" class="grid"></div>

    <!-- CART -->
    <div class="cart-btn" onclick="toggleCart()">🛒</div>

    <div class="cart-box" id="cartBox">
        <h3>Cart</h3>
        <div id="cartItems"></div>
        <h4>Total: ₹<span id="total">0</span></h4>
        <button onclick="sendCartWhatsApp()">Order Cart</button>
    </div>

    <!-- REVIEW -->
    <div class="review-section">
        <h4>Reviews</h4>

        <input id="reviewName" placeholder="Name">

        <select id="reviewProductSelect"></select>

        <select id="reviewRating">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>

        <textarea id="reviewComment" placeholder="Write review"></textarea>

        <button onclick="submitReview()">Submit</button>

        <div id="reviewList"></div>
    </div>

    <script>
        const whatsappNumber = "917339563621";

        const products = [];
        for (let i = 1; i <= 20; i++) {
            products.push({
                name: "Pre " + i,
                price: 1000 + i * 50,
                img: "https://via.placeholder.com/200"
            });
        }

        const grid = document.getElementById("grid");
        let cart = [];

        /* LOAD PRODUCTS */
        products.forEach((p, i) => {
            const div = document.createElement("div");
            div.className = "product-card";
            div.innerHTML = `
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <p class="price">₹${p.price}</p>
                <button onclick="orderNow(${i})">Order</button>
                <button onclick="addToCart(${i})">Cart</button>
            `;
            grid.appendChild(div);
        });

        /* ✅ DIRECT ORDER (FIXED) */
        function orderNow(i) {
            const p = products[i];

            let msg = `Order:
${p.name}
Price: ₹${p.price}`;

            let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;

            window.location.href = url;
        }

        /* CART */
        function addToCart(i) {
            let item = { ...products[i], qty: 1, total: products[i].price };
            cart.push(item);
            renderCart();
        }

        function renderCart() {
            let total = 0;
            let html = "";

            cart.forEach((c, i) => {
                total += c.total;
                html += `${c.name} ₹${c.total} <button onclick="removeItem(${i})">X</button><br>`;
            });

            document.getElementById("cartItems").innerHTML = html;
            document.getElementById("total").innerText = total;
        }

        function removeItem(i) {
            cart.splice(i, 1);
            renderCart();
        }

        function toggleCart() {
            let box = document.getElementById("cartBox");
            box.style.display = box.style.display === "block" ? "none" : "block";
        }

        function sendCartWhatsApp() {
            if (cart.length === 0) {
                alert("Cart empty");
                return;
            }

            let msg = "Order:\n";
            let total = 0;

            cart.forEach(c => {
                msg += `${c.name} ₹${c.total}\n`;
                total += c.total;
            });

            msg += `Total: ₹${total}`;

            let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;

            window.location.href = url;
        }

        /* REVIEW */
        const select = document.getElementById("reviewProductSelect");

        products.forEach((p, i) => {
            let opt = document.createElement("option");
            opt.value = i;
            opt.text = p.name;
            select.appendChild(opt);
        });

        function submitReview() {
            const name = document.getElementById("reviewName").value;
            const comment = document.getElementById("reviewComment").value;
            const rating = document.getElementById("reviewRating").value;

            if (!name || !comment) {
                alert("Fill all fields");
                return;
            }

            let div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `<b>${name} ${"⭐".repeat(rating)}</b><p>${comment}</p>`;
            document.getElementById("reviewList").appendChild(div);

            document.getElementById("reviewName").value = "";
            document.getElementById("reviewComment").value = "";
        }
    </script>

</body>

</html>
