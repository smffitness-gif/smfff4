<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- ✅ FIX THIS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SMF Fitness Products</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        .navbar {
            background: #111;
            padding: 15px;
        }

        .list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .list button {
            padding: 15px;
            background: #ff6600;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .list button:hover {
            background: #00c853;
        }

        /* ===== RESPONSIVE ===== */

        /* Tablet */
        @media (max-width: 768px) {
            .list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .list {
                grid-template-columns: 1fr;
            }

            .navbar h2 {
                font-size: 16px;
            }
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;

            font-size: 22px;
            color: white;

            background: #111;
            padding: 10px 14px;

            border-radius: 50%;
            text-decoration: none;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }



        .back-btn:active {
            transform: scale(0.95);
        }
    </style>

</head>

<body>

    <div class="navbar">
        <a href="index.html" class="back-btn">⬅</a>

        <h2>SMF SUPPLIMENTS</h2>
    </div>

    <h2>Select Category</h2>

    <div class="list">
        <button onclick="location.href='whey.html'">Whey Protein</button>
        <button onclick="location.href='creatine.html'">Creatine</button>
        <button onclick="location.href='pre.html'">Pre Workout</button>
        <button onclick="location.href='bcaa.html'">BCAA</button>
        <button onclick="location.href='eaa.html'">EAA</button>
        <button onclick="location.href='gainer.html'">Mass Gainer</button>
    </div>

</body>

</html>
