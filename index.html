<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMF Fitness & Supplements</title>
    <link rel="icon" href="img/smf logo (1).jpeg">

    <style>
        /* ===== GLOBAL ===== */
        body {
            background-color: #f5f5f5;
            color: #111;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: relative;
            padding: 15px;
            background: #232f3e;
            color: white;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        nav h1 {
            margin: 0;
            font-size: 22px;
        }

        /* ===== HIDDEN CHECKBOX FOR HAMBURGER ===== */
        #menu-toggle {
            display: none;
        }

        /* ===== MENU ICON ===== */
        .menu-icon {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            display: none;
        }

        /* ===== MENU ===== */
        .menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }

        /* ===== LOGO ===== */
        .logo {
            text-align: center;
            margin: 20px 0;
            background-color: white;
        }

        .logo img {
            width: 300px;
            max-width: 90%;
            border-radius: 10px;
            background-color: white;
        }

        /* ===== PRODUCT GRID ===== */
        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .product-card h3 {
            margin: 10px 0 5px;
            font-size: 18px;
            color: #111;
        }

        .product-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }

        .product-card .price {
            color: #B12704;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .product-card button {
            background: #ff9900;
            border: none;
            padding: 8px 12px;
            margin-bottom: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .product-card button:hover {
            background: #e68a00;
        }

        /* ===== SOCIAL LINKS ===== */
        .link {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: #111;
        }

        .link a {
            text-align: center;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .link img {
            display: block;
            margin: auto;
            height: 30px;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:1024px) {
            .products {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media(max-width:768px) {
            .products {
                grid-template-columns: repeat(2, 1fr);
            }

            .logo img {
                width: 220px;
            }

            nav h1 {
                font-size: 18px;
            }

            .menu-icon {
                display: block;
            }

            .menu {
                display: none;
                flex-direction: column;
                background: #111;
                position: absolute;
                top: 60px;
                right: 10px;
                width: 200px;
                border-radius: 10px;
            }

            #menu-toggle:checked+.menu-icon+.menu {
                display: flex;
            }

            .menu a {
                padding: 12px;
                border-bottom: 1px solid #333;
            }
        }

        @media(max-width:480px) {
            .products {
                grid-template-columns: 1fr;
            }

            .logo img {
                width: 180px;
            }

            .link {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav>
        <h1>SMF FITNESS & SUPPLEMENTS</h1>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>
        <div class="menu">
            <a href="products.html">SUPPLEMENTS</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- ===== LOGO ===== -->
    <div class="logo">
        <img src="img/smf logo (1).png" alt="SMF Logo" style="width: 500px;">
    </div>

    <!-- ===== SOCIAL LINKS ===== -->
    <div class="link">
        <a href="https://www.instagram.com/smf_501?igsh=MTAxa21xNTlyYWZqbQ==">
            <img src="img/Social=Instagram,Style=Original (1).svg" alt="Instagram">
            INSTAGRAM
        </a>
        <a href="#">
            <img src="img/Social=Facebook,Style=Original (1).svg" alt="Facebook">
            FACEBOOK
        </a>
        <a href="#">
            <img src="img/Social=WhatsApp,Style=Original (1).svg" alt="WhatsApp">
            WHATSAPP
        </a>
    </div>

</body>

</html>
